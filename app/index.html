<!doctype html>
<html lang="en">
  <head>
    <script>
      if (typeof global === 'undefined') {
        var global = window;
      }
    </script>
    <script>
      // 다크모드 플래시(FOUC) 방지: 앱 렌더 전에 저장된 테마 선호(또는 시스템)를 즉시 반영
      (function () {
        try {
          var pref = localStorage.getItem('osori_theme') || 'system';
          var isDark = pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0066ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OSORI" />
    <meta name="description" content="AI 재무 코칭 가계부 - 넛지 기반으로 소비 습관을 코칭해드립니다" />
    <title>OSORI - 오늘의 소비 리포트</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
